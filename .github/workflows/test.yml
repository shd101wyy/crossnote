name: Test

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install nodejs
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: .tool-versions

      - name: Install pandoc
        # The wikilink-embed and colon-fence test suites spawn `pandoc`
        # to exercise the markdown_yo / pandoc transformer paths.  The
        # ubuntu-latest runner doesn't ship pandoc, so install it here
        # before tests run — otherwise those suites fail with
        # `Error: spawn pandoc ENOENT`.
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Install dependencies
        run: pnpm install

      - name: Run checks
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Build typedoc
        run: pnpm typedoc
